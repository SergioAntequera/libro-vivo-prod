name: Quality gates

on:
  pull_request:
  push:
    branches:
      - main
  deployment_status:
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_OPTIONS: --max-old-space-size=4096
  NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-public-anon-key
  NEXT_PUBLIC_SITE_URL: https://www.libro-vivo.es

jobs:
  local-quality:
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Audit production dependencies
        run: npm run security:audit:prod
      - name: Typecheck
        run: npm run typecheck
      - name: Build from a clean checkout
        run: npm run build
      - name: Validate mobile PWA artifacts
        run: npm run mobile:pwa:check && npm run mobile:pwa:check:sw
      - name: Test account data contracts
        run: npm run test:account-data-export && npm run test:account-deletion
      - name: Test server telemetry
        run: npm run test:server-telemetry

  public-mobile-pwa:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'deployment_status' &&
      github.event.deployment_status.state == 'success' &&
      github.event.deployment.ref == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Validate public mobile PWA
        run: npm run qa:mobile:pwa:public
      - name: Upload QA evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-pwa-public-qa
          path: tmp/qa-mobile-pwa-public
          if-no-files-found: warn
          retention-days: 14
